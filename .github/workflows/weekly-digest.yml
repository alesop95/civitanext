name: Weekly digest

# Ogni lunedi' alle 07:00 UTC (08:00/09:00 in Italia secondo l'ora legale), chiama la route
# protetta che genera e invia il digest settimanale (ADR-017). Non puo' funzionare finche' non
# esiste un URL pubblico raggiungibile (il deploy reale su Cloudflare e' bloccato da ADR-006) e
# finche' i secret DEPLOY_URL/CRON_SECRET non sono impostati su GitHub: vedi "Interventi manuali
# in sospeso" in .claude/context/current-work.md. Eseguibile anche a mano da GitHub (tab
# Actions -> Weekly digest -> Run workflow) per un test puntuale, sempre a valle degli stessi
# prerequisiti.
on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Chiama la route del digest
        run: |
          curl --fail --show-error --request POST \
            "${DEPLOY_URL}/api/digest" \
            --header "Authorization: Bearer ${CRON_SECRET}"
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
