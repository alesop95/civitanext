name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DATABASE_URL: postgresql://civitanext_ci:civitanext_ci@localhost:5432/civitanext_ci
  # Non un segreto di produzione: serve solo a firmare i JWT per la durata di un singolo run,
  # su un database e un server entrambi effimeri e distrutti a fine job. In locale arriva da
  # .env (mai versionato), che qui non esiste: senza questa variabile NextAuth rifiuta ogni
  # richiesta in modalita' produzione con MissingSecret.
  AUTH_SECRET: civitanext-ci-only-not-a-real-secret

jobs:
  test:
    name: Lint, build, unit e e2e (runtime Node)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: civitanext_ci
          POSTGRES_PASSWORD: civitanext_ci
          POSTGRES_DB: civitanext_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U civitanext_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Applica le migrazioni Prisma al Postgres del job
        run: npx prisma migrate deploy

      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

      - name: Unit/integration test (Vitest, Postgres reale)
        run: npm run test

      - name: Installa il browser Playwright
        run: npx playwright install --with-deps chromium

      - name: Smoke e2e (Playwright, next start)
        run: npm run test:e2e

      - name: Carica il report Playwright in caso di fallimento
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  test-cloudflare-adapter:
    # Job separato e piu' lento: builda con l'adapter OpenNext reale e fa girare lo stesso smoke
    # e2e contro il runtime Cloudflare vero (workerd via wrangler), non contro Node. Chiude la
    # verifica lasciata esplicitamente aperta da ADR-006 (memory/decisions.md): se il bug di
    # bundling osservato su Windows con `wrangler dev` fosse un limite del toolchain OpenNext su
    # Windows o un problema reale dell'adapter, dato che qui gira su Linux, la stessa famiglia di
    # infrastruttura di Cloudflare. Non verificabile in locale su questa macchina per lo stesso
    # motivo (ADR-006): la prima esecuzione reale di questo job E' la verifica.
    name: E2E su adapter Cloudflare reale (workerd)
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: civitanext_ci
          POSTGRES_PASSWORD: civitanext_ci
          POSTGRES_DB: civitanext_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U civitanext_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Applica le migrazioni Prisma al Postgres del job
        run: npx prisma migrate deploy

      - name: Build con l'adapter OpenNext per Cloudflare
        run: npx opennextjs-cloudflare build

      - name: Installa il browser Playwright
        run: npx playwright install --with-deps chromium

      - name: Scrive .dev.vars per l'emulazione locale di Wrangler
        # Dentro il Worker, process.env e' popolato dai binding "env" di Wrangler
        # (populateProcessEnv in @opennextjs/cloudflare), non dall'ambiente della shell: senza
        # .dev.vars, DATABASE_URL/AUTH_SECRET restano undefined nel Worker anche se gia' presenti
        # come env del job, e ogni rotta che tocca auth o Prisma risponde 500.
        run: |
          echo "DATABASE_URL=${DATABASE_URL}" >> .dev.vars
          echo "AUTH_SECRET=${AUTH_SECRET}" >> .dev.vars

      - name: Avvia il preview Cloudflare (workerd) in background
        run: |
          npx opennextjs-cloudflare preview -- --port 8787 &
          status=000
          for i in $(seq 1 30); do
            status=$(curl -s -o /tmp/cf-preview-response.html -w "%{http_code}" http://localhost:8787 || echo "000")
            if [ "$status" = "200" ]; then exit 0; fi
            sleep 2
          done
          # A differenza di curl -sf (che scarta il corpo su errore, mostrando solo "500" senza
          # dire perche'), qui si stampa la risposta vera: se il worker fallisce con un'eccezione
          # non gestita, wrangler in locale la incorpora nella pagina di errore HTML, non solo nei
          # log di processo.
          echo "Il preview Cloudflare non ha risposto con 200 entro il timeout (ultimo status: $status)" >&2
          echo "--- Corpo dell'ultima risposta ---" >&2
          cat /tmp/cf-preview-response.html >&2 || true
          exit 1

      - name: Smoke e2e contro il runtime Cloudflare reale
        env:
          PW_BASE_URL: http://localhost:8787
          CI: "true"
        run: npx playwright test

      - name: Carica il report Playwright in caso di fallimento
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-cloudflare
          path: playwright-report/
          retention-days: 7
