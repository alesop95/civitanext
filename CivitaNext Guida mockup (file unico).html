document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 font-size: 13px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--accent); display: block; margin-bottom: 10px; }\n  h1 { font-size: 52px; font-weight: 900; line-height: 1.04; letter-spacing: -0.5px; }\n  .lead { font-size: 19px; line-height: 1.55; margin: 18px 0 8px; max-width: 42em; }\n  .hand { font-family: var(--hand); font-size: 26px; color: var(--accent); transform: rotate(-1.5deg); display: inline-block; }\n  hr { border: none; border-top: 3px solid var(--ink); margin: 34px 0; }\n  h2 { font-size: 28px; font-weight: 900; margin: 38px 0 14px; display: flex; align-items: baseline; gap: 12px; }\n  h2 .n { font-family: var(--sans); font-size: 15px; font-weight: 900; color: #fff; background: var(--accent); width: 34px; height: 34px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; flex: none; transform: translateY(-2px); }\n  h3 { font-size: 20px; font-weight: 700; margin: 22px 0 6px; }\n  p { margin-bottom: 12px; }\n  .card { background: var(--paper-card); border: 2.5px solid var(--ink); border-radius: 3px; padding: 22px 24px; box-shadow: 5px 5px 0 rgba(30,58,95,0.14); margin: 18px 0; }\n  .accounts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 18px 0; }\n  .acc { background: var(--ink); color: var(--paper); border-radius: 3px; padding: 18px 20px; }\n  .acc .role { font-family: var(--sans); font-weight: 700; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: #E8A99E; margin-bottom: 8px; }\n  .acc .cred { font-family: ui-monospace, monospace; font-size: 14px; line-height: 1.7; }\n  .acc .cred b { color: #fff; }\n  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0; }\n  .feat { background: var(--paper-card); border: 2px solid var(--ink); border-radius: 3px; padding: 14px 16px; }\n  .feat h4 { font-family: var(--sans); font-weight: 700; font-size: 15px; margin-bottom: 4px; }\n  .feat p { font-size: 14px; color: var(--ink-soft); margin: 0; line-height: 1.4; }\n  ol.steps { counter-reset: s; list-style: none; padding: 0; margin: 16px 0; }\n  ol.steps li { position: relative; padding: 10px 0 10px 44px; border-bottom: 1.5px dashed rgba(30,58,95,0.3); font-size: 16px; }\n  ol.steps li:last-child { border-bottom: none; }\n  ol.steps li::before { counter-increment: s; content: counter(s); position: absolute; left: 0; top: 9px; width: 30px; height: 30px; background: var(--ink); color: var(--paper); font-family: var(--sans); font-weight: 900; font-size: 14px; border-radius: 999px; display: flex; align-items: center; justify-content: center; }\n  ul.plain { list-style: none; padding: 0; margin: 12px 0; }\n  ul.plain li { padding: 7px 0 7px 26px; position: relative; font-size: 16px; border-bottom: 1px solid rgba(30,58,95,0.12); }\n  ul.plain li:last-child { border: none; }\n  ul.plain li::before { content: ''; position: absolute; left: 4px; top: 15px; width: 9px; height: 9px; background: var(--accent); border-radius: 999px; }\n  code { font-family: ui-monospace, monospace; font-size: 13px; background: rgba(30,58,95,0.08); padding: 2px 7px; border-radius: 3px; }\n  .note { font-family: var(--sans); font-size: 14px; color: var(--ink-soft); }\n  .tag { display: inline-block; font-family: var(--sans); font-weight: 700; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; background: var(--accent); color: #fff; padding: 3px 9px; border-radius: 999px; }\n  @media (max-width: 640px) { .accounts, .grid { grid-template-columns: 1fr; } h1 { font-size: 38px; } }\n  @media print { body { padding: 0; } .card, .acc, .feat { break-inside: avoid; } }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<div class=\"doc\">\n  <span class=\"kicker\">CivitaNext · Prototipo dimostrativo<\u002Fspan>\n  <h1>Guida al mockup<br>per il cliente<\u002Fh1>\n  <p class=\"lead\">Questo documento spiega, senza tecnicismi, cosa è il prototipo di CivitaNext, come aprirlo, come muoversi dentro e cosa potrà fare la piattaforma una volta sviluppata.<\u002Fp>\n  <p class=\"hand\">Un giro guidato, dalla A alla Z.<\u002Fp>\n\n  <hr>\n\n  <h2><span class=\"n\">1<\u002Fspan> Cos'è questo<\u002Fh2>\n  <p>È un <b>mockup interattivo<\u002Fb>: una simulazione realistica e cliccabile della futura piattaforma di CivitaNext. Si guarda e si tocca come se fosse il sito vero, ma i dati sono di esempio e l'iscrizione, i pagamenti e gli accessi sono finti, pensati solo per mostrare come funzionerà.<\u002Fp>\n  <p>Serve a <b>vedere e decidere<\u002Fb>: l'aspetto, le sezioni, i percorsi degli utenti. È la base su cui poi partirà lo sviluppo vero e proprio.<\u002Fp>\n  <div class=\"card\">\n    <p style=\"margin:0\"><span class=\"tag\">Importante<\u002Fspan><\u002Fp>\n    <p style=\"margin-top:10px;margin-bottom:0\">Tutto quello che vedi è <b>modificabile<\u002Fb>. Colori, testi, sezioni: niente è definitivo finché non lo confermiamo insieme. Questo è il momento giusto per chiedere cambiamenti.<\u002Fp>\n  <\u002Fdiv>\n\n  <h2><span class=\"n\">2<\u002Fspan> Come si apre<\u002Fh2>\n  <p>Ci sono due versioni da guardare. Si aprono con un doppio clic, in un normale browser (Chrome, Edge, Safari).<\u002Fp>\n  <div class=\"grid\">\n    <div class=\"feat\"><h4>Versione desktop<\u002Fh4><p>File <code>CivitaNext Piattaforma.html<\u002Fcode> · come si vedrà da computer.<\u002Fp><\u002Fdiv>\n    <div class=\"feat\"><h4>Versione mobile<\u002Fh4><p>File <code>CivitaNext Mobile.html<\u002Fcode> · come si vedrà su telefono (iPhone e Android).<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"note\">Nella versione mobile, in alto a destra c'è il pannello \"Tweaks\" dove si può passare da iPhone ad Android e cambiare il colore d'accento, giusto per vedere le alternative.<\u002Fp>\n\n  <h2><span class=\"n\">3<\u002Fspan> Gli accessi di prova<\u002Fh2>\n  <p>Per provare le parti riservate puoi entrare con due profili finti. Premi \"Accedi\" e usa una di queste coppie:<\u002Fp>\n  <div class=\"accounts\">\n    <div class=\"acc\">\n      <div class=\"role\">Socio · cittadino iscritto<\u002Fdiv>\n      <div class=\"cred\">email · <b>socio@civitanext.it<\u002Fb><br>password · <b>civita2026<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"acc\">\n      <div class=\"role\">Admin · chi gestisce<\u002Fdiv>\n      <div class=\"cred\">email · <b>admin@civitanext.it<\u002Fb><br>password · <b>admin2026<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"note\">Il socio vede il proprio profilo, la tessera e può proporre idee. L'admin vede in più il pannello di controllo per gestire tutto.<\u002Fp>\n\n  <h2><span class=\"n\">4<\u002Fspan> Un giro consigliato<\u002Fh2>\n  <p>Se è la prima volta, segui questo percorso per vedere le cose principali:<\u002Fp>\n  <ol class=\"steps\">\n    <li>Parti dalla <b>Home<\u002Fb>: scorri prossimi eventi, discussioni e il quiz in evidenza. Prova a votare il sondaggio rapido.<\u002Fli>\n    <li>Vai su <b>Eventi<\u002Fb>: guarda il calendario, filtra per categoria, premi \"Partecipo\".<\u002Fli>\n    <li>Apri <b>Quiz<\u002Fb>: fai un quiz fino al risultato, poi guarda la classifica.<\u002Fli>\n    <li>Entra nel <b>Forum<\u002Fb>: apri una discussione, vota, scrivi una risposta.<\u002Fli>\n    <li>Vai su <b>Proposte<\u002Fb>: vota un'idea e guarda la scheda \"Attuazione\".<\u002Fli>\n    <li>Esplora <b>Città<\u002Fb> e <b>Community<\u002Fb>: mappa, spazi, timeline, mentorship, competenze.<\u002Fli>\n    <li>Fai <b>login come socio<\u002Fb> e guarda profilo, tessera e badge.<\u002Fli>\n    <li>Fai <b>login come admin<\u002Fb> e apri il pannello: approva una proposta e guarda come diventa pubblica.<\u002Fli>\n  <\u002Fol>\n  <p class=\"note\">C'è anche un file <b>Flusso di Test.html<\u002Fb> con una lista completa e spuntabile di tutto ciò che si può provare, passo per passo.<\u002Fp>\n\n  <h2><span class=\"n\">5<\u002Fspan> Cosa contiene la piattaforma<\u002Fh2>\n  <p>Tutte le funzioni previste, già visibili nel mockup:<\u002Fp>\n  <div class=\"grid\">\n    <div class=\"feat\"><h4>Eventi e calendario<\u002Fh4><p>Calendario, filtri, partecipazione, sincronizzazione con Google Calendar.<\u002Fp><\u002Fdiv>\n    <div class=\"feat\"><h4>Quiz civici<\u002Fh4><p>Quiz a domande con spiegazioni, punteggio e classifica mensile.<\u002Fp><\u002Fdiv>\n    <div class=\"feat\"><h4>Forum<\u002Fh4><p>Discussioni per categoria, voti, risposte, moderazione.<\u002Fp><\u002Fdiv>\n    <div class=\"feat\"><h4>Proposte e voti<\u002Fh4><p>I cittadini propongono idee, le votano, ne seguono l'attuazione.<\u002Fp><\u002Fdiv>\n    <div class=\"feat\"><h4>Profilo socio<\u002Fh4><p>Tessera digitale, badge, reputazione, preferenze, iscrizione online.<\u002Fp><\u002Fdiv>\n    <div class=\"feat\"><h4>Pannello admin<\u002Fh4><p>Statistiche, approvazioni, moderazione, gestione eventi/quiz/utenti, analytics.<\u002Fp><\u002Fdiv>\n    <div class=\"feat\"><h4>La città<\u002Fh4><p>Mappa, spazi civici, timeline storica, galleria foto, documenti ufficiali.<\u002Fp><\u002Fdiv>\n    <div class=\"feat\"><h4>Community<\u002Fh4><p>Mentorship, scambio di competenze, webinar, rassegna stampa.<\u002Fp><\u002Fdiv>\n    <div class=\"feat\"><h4>Notifiche<\u002Fh4><p>Avvisi e promemoria su eventi e proposte.<\u002Fp><\u002Fdiv>\n    <div class=\"feat\"><h4>Mobile dedicato<\u002Fh4><p>Esperienza pensata per telefono, iPhone e Android.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n\n  <h2><span class=\"n\">6<\u002Fspan> Cosa è finto, per ora<\u002Fh2>\n  <ul class=\"plain\">\n    <li>Gli <b>accessi<\u002Fb> e l'iscrizione: nessun account reale, nessun pagamento vero.<\u002Fli>\n    <li>I <b>contenuti<\u002Fb> (eventi, discussioni, foto) sono esempi per riempire le pagine.<\u002Fli>\n    <li>Le <b>foto<\u002Fb> sono segnaposto: andranno fornite quelle reali.<\u002Fli>\n    <li>La <b>timeline storica<\u002Fb> della città ha voci \"da completare\": vanno raccolti i materiali (foto e date) insieme alla biblioteca o agli archivi.<\u002Fli>\n  <\u002Ful>\n  <p>Tutto questo diventa reale nella fase di sviluppo, descritta nella guida tecnica.<\u002Fp>\n\n  <hr>\n  <p class=\"hand\">Hai dubbi o vuoi cambiare qualcosa? Annota e ne parliamo.<\u002Fp>\n  <p class=\"note\">CivitaNext · documento dimostrativo. Versione desktop e mobile incluse nel pacchetto.<\u002Fp>\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
